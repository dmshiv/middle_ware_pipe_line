# =============================================================================
# LOGSTASH PIPELINE — Transaction Log Processing
# =============================================================================
#
# PURPOSE:
#   Logstash sits between Kafka and Elasticsearch.
#   It consumes transaction events from multiple Kafka topics,
#   transforms/enriches them, and indexes into Elasticsearch.
#
# WHY LOGSTASH (not direct Kafka Connect → ES):
#   1. PCI-DSS MASKING: Card numbers MUST be masked before storage.
#      Logstash's mutate/gsub does this reliably.
#   2. FIELD TRANSFORMATIONS: Rename snake_case → camelCase, parse dates,
#      add computed fields (risk_category, is_international, etc.)
#   3. CONDITIONAL ROUTING: Different events → different ES indices
#      (transactions-*, fraud-alerts-*, aggregations-*)
#   4. GEO-IP ENRICHMENT: Convert lat/lon to geo_point for Kibana maps
#
# PIPELINE:
#   Kafka topics → Logstash → Elasticsearch indices
#
# =============================================================================

# ─── INPUT: Read from multiple Kafka topics ──────────────────────────────────
# WHY MULTIPLE INPUTS: Different topics have different data structures.
# We tag each input so the output section knows which index to write to.
input {

  # Enriched transactions (main stream — from enrichment service)
  kafka {
    bootstrap_servers => "${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}"
    topics => ["transactions.enriched"]
    group_id => "logstash-enriched-consumer"
    auto_offset_reset => "latest"
    codec => "json"
    decorate_events => "basic"          # Add Kafka metadata (topic, partition, offset)
    consumer_threads => 2                # Parallel consumers
    tags => ["enriched"]
  }

  # Blocked transactions (instantly declined by Hazelcast blocklist)
  kafka {
    bootstrap_servers => "${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}"
    topics => ["transactions.blocked"]
    group_id => "logstash-blocked-consumer"
    auto_offset_reset => "latest"
    codec => "json"
    decorate_events => "basic"
    tags => ["blocked"]
  }

  # Fraud alerts (generated by Flink fraud detection)
  kafka {
    bootstrap_servers => "${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}"
    topics => ["transactions.alerts"]
    group_id => "logstash-alerts-consumer"
    auto_offset_reset => "latest"
    codec => "json"
    decorate_events => "basic"
    tags => ["fraud_alert"]
  }

  # Aggregated metrics (generated by Flink every 5 min)
  kafka {
    bootstrap_servers => "${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}"
    topics => ["transactions.aggregated"]
    group_id => "logstash-aggregation-consumer"
    auto_offset_reset => "latest"
    codec => "json"
    decorate_events => "basic"
    tags => ["aggregation"]
  }
}

# ─── FILTER: Transform and enrich events ─────────────────────────────────────
filter {

  # ═══════════════════════════════════════════════════════════════════════════
  # PCI-DSS CARD NUMBER MASKING — THE MOST CRITICAL FILTER
  # ═══════════════════════════════════════════════════════════════════════════
  # Payment Card Industry Data Security Standard (PCI-DSS) REQUIRES that
  # full card numbers are NEVER stored in logs or analytics systems.
  # Only first 6 + last 4 digits may be stored (for BIN identification).
  #
  # We mask: 4111111111111111 → 411111XXXXXX1111
  # The simulator already sends masked versions, but this is DEFENSE IN DEPTH.
  # Even if a bug sends an unmasked number, Logstash catches it here.
  # ═══════════════════════════════════════════════════════════════════════════
  if [card_number] {
    mutate {
      gsub => [
        # Replace middle digits with X (keep first 6, last 4)
        "card_number", "(?<=.{6}).(?=.{4})", "X"
      ]
    }
  }

  # ─── PARSE TIMESTAMP ────────────────────────────────────────────────────
  # Convert ISO-8601 timestamp string to Logstash @timestamp
  # WHY: Elasticsearch needs a proper date type for time-based queries and ILM
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
      timezone => "UTC"
    }
  }

  # ─── GEO-POINT FOR KIBANA MAPS ─────────────────────────────────────────
  # Combine latitude + longitude into an Elasticsearch geo_point field.
  # WHY: Kibana's map visualization requires geo_point type (not separate fields)
  # This enables the "Live Transaction Map" dashboard showing global heatmap.
  if [latitude] and [longitude] {
    mutate {
      add_field => {
        "[location][lat]" => "%{latitude}"
        "[location][lon]" => "%{longitude}"
      }
    }
    mutate {
      convert => {
        "[location][lat]" => "float"
        "[location][lon]" => "float"
      }
    }
  }

  # ─── ENRICHMENT: ADD COMPUTED FIELDS ────────────────────────────────────
  # These derived fields make Kibana dashboards easier to build
  if "enriched" in [tags] or "blocked" in [tags] {

    # International transaction flag
    # WHY: International transactions have ~3x higher fraud rate
    ruby {
      code => '
        card_country = event.get("[enrichment][home_country]") || "US"
        txn_country = event.get("country") || "US"
        event.set("is_international", card_country != txn_country)
      '
    }

    # Amount bucket (for histogram visualizations)
    ruby {
      code => '
        amount = event.get("amount").to_f rescue 0
        if amount < 50
          event.set("amount_bucket", "MICRO_<50")
        elsif amount < 200
          event.set("amount_bucket", "SMALL_50-200")
        elsif amount < 1000
          event.set("amount_bucket", "MEDIUM_200-1K")
        elsif amount < 5000
          event.set("amount_bucket", "LARGE_1K-5K")
        else
          event.set("amount_bucket", "XLARGE_>5K")
        end
      '
    }

    # Hour of day (for time-of-day analysis)
    ruby {
      code => '
        ts = event.get("@timestamp")
        if ts
          event.set("hour_of_day", ts.time.hour)
        end
      '
    }
  }

  # ─── FRAUD ALERT ENRICHMENT ────────────────────────────────────────────
  if "fraud_alert" in [tags] {
    mutate {
      add_field => { "alert_status" => "OPEN" }
      add_field => { "investigated" => "false" }
    }
  }

  # ─── REMOVE INTERNAL FIELDS ────────────────────────────────────────────
  # Don't index Kafka metadata or Logstash internals into Elasticsearch
  mutate {
    remove_field => ["@version", "event"]
  }
}

# ─── OUTPUT: Route to appropriate Elasticsearch indices ───────────────────────
output {

  # ─── ENRICHED TRANSACTIONS → transactions-YYYY.MM.DD ───────────────────
  if "enriched" in [tags] {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOST:http://elasticsearch:9200}"]
      index => "transactions-%{+YYYY.MM.dd}"
      # ILM (Index Lifecycle Management) handles rollover:
      # Hot (7 days) → Warm (30 days) → Delete
      # WHY: Transaction data is expensive to store. Recent data is hot,
      # older data can be compressed and eventually deleted.
    }
  }

  # ─── BLOCKED TRANSACTIONS → transactions-blocked-YYYY.MM.DD ────────────
  if "blocked" in [tags] {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOST:http://elasticsearch:9200}"]
      index => "transactions-blocked-%{+YYYY.MM.dd}"
    }
  }

  # ─── FRAUD ALERTS → fraud-alerts (single index, not date-based) ───────
  # WHY single index: Alerts need to be searchable across all time.
  # Investigators search "show me all geo-hop alerts for card X" without
  # knowing the date. A single index makes this query simple.
  if "fraud_alert" in [tags] {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOST:http://elasticsearch:9200}"]
      index => "fraud-alerts"
      document_id => "%{detected_at}-%{alert_type}"  # Dedup by alert
    }
  }

  # ─── AGGREGATIONS → transaction-aggregations-YYYY.MM.DD ────────────────
  if "aggregation" in [tags] {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOST:http://elasticsearch:9200}"]
      index => "transaction-aggregations-%{+YYYY.MM.dd}"
    }
  }

  # ─── DEBUG: Print to stdout (remove in production) ─────────────────────
  # Useful during development to see what Logstash is processing
  # stdout { codec => dots }
}
