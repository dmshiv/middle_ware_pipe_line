# =============================================================================
# LOG4J2 Configuration for Flink Jobs
# =============================================================================
# Controls logging output format and levels.
# In production, this would write to a file + ship to ELK via Filebeat.
# =============================================================================

rootLogger.level = INFO
rootLogger.appenderRef.console.ref = ConsoleAppender

appender.console.name = ConsoleAppender
appender.console.type = Console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss,SSS} [%t] %-5p %c{1} - %m%n

# Reduce noise from Kafka and Flink internals
logger.kafka.name = org.apache.kafka
logger.kafka.level = WARN

logger.flink.name = org.apache.flink
logger.flink.level = INFO

# Our fraud detection logs at INFO level
logger.fraud.name = com.visa.fraud
logger.fraud.level = INFO
